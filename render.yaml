services:
  - type: web
    name: birthfacts
    env: static
    buildCommand: npm run build
    staticPublishPath: ./out
    headers:
      - path: /_next/static/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
